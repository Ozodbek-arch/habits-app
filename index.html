<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laylo Kids - Ayollar va Bolalar uchun</title>
  
  <!-- Google Fonts: Inter & Nunito -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              pink: '#FF4E88',      /* Asosiy yorqin pushti */
              lightPink: '#FFF0F5', /* Fon va yengil elementlar uchun */
              dark: '#1E293B',      /* To'q matn ranglari */
              gray: '#64748B',      /* Yordamchi matnlar */
              border: '#FFE4EC'     /* Chegaralar */
            }
          },
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],
            display: ['"Playfair Display"', 'serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM (Production Build) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Compiler for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Supabase JS Client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #F8FAFC;
    }
    /* Scrollbar yashirish */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50 flex justify-center items-center min-h-screen p-0 sm:p-4">

  <!-- Mobil ekran simulyatori (Yoki haqiqiy telefonda ochganda to'liq ekran) -->
  <div id="root" class="w-full max-w-md bg-white min-h-screen sm:min-h-[850px] sm:rounded-[40px] sm:shadow-2xl overflow-hidden relative flex flex-col border border-slate-100"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =======================================================
    // ⚙️ SUPABASE VA TELEGRAM SOZLAMALARI
    // =======================================================
    const SUPABASE_URL = "https://your-supabase-project.supabase.co"; 
    const SUPABASE_KEY = "your-anon-key"; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TELEGRAM_BOT_TOKEN = "YOUR_BOT_TOKEN";
    const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID";

    function App() {
      // Navigatsiya holati: 'home', 'category', 'detail', 'cart', 'orders', 'favorites'
      const [currentScreen, setCurrentScreen] = useState('home'); 
      const [selectedProduct, setSelectedProduct] = useState(null);
      
      const [products, setProducts] = useState([
        // Agar Supabase ulanmagan bo'lsa, rasmdagi mahsulotlar default ko'rinadi:
        { id: '1', name: "Ayollar ko'ylaki", category_id: 'ayollar', price: 96000, old_price: 120000, discount: 20, image_url: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=400", size: "M", color: "Pushti", stock: 12, code: "124578", description: "Yozgi kolleksiya. Paxtali va qulay matodan tikilgan." },
        { id: '2', name: "Bolalar ko'ylaki", category_id: 'bolalar', price: 105000, old_price: 150000, discount: 30, image_url: "https://images.unsplash.com/photo-1518831959646-742c3a14ebf7?w=400", size: "S", color: "Sariq", stock: 8, code: "124579", description: "Yangi kolleksiya. Bolalar terisiga zarar yetkazmaydi." },
        { id: '3', name: "Ayollar pidjaki", category_id: 'ayollar', price: 238000, old_price: 280000, discount: 15, image_url: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", size: "L", color: "Pushti", stock: 5, code: "124580", description: "Zamonaviy uslubda tikilgan ayollar pidjagi." },
        { id: '4', name: "Ayollar ko'ylak yashil", category_id: 'ayollar', price: 97500, old_price: 130000, discount: 25, image_url: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=400", size: "M", color: "Yashil", stock: 15, code: "124581", description: "Yozgi kolleksiya, krep-shifon matosidan." }
      ]);

      const [cart, setCart] = useState([]);
      const [favorites, setFavorites] = useState([]);
      const [selectedSize, setSelectedSize] = useState('M');
      const [selectedColor, setSelectedColor] = useState('Pushti');
      const [searchQuery, setSearchQuery] = useState('');

      // Buyurtma formasi holati
      const [orderName, setOrderName] = useState('');
      const [orderPhone, setOrderPhone] = useState('');
      const [orderAddress, setOrderAddress] = useState('');

      useEffect(() => {
        loadDataFromSupabase();
      }, []);

      const loadDataFromSupabase = async () => {
        try {
          const { data: prods, error } = await supabaseClient.from('products').select('*');
          if (prods && prods.length > 0) {
            setProducts(prods);
          }
        } catch (err) {
          console.log("Supabase ulanishi faollashtirilmagan, namunaviy ma'lumotlar ishlatilmoqda.");
        }
      };

      // Savatchaga qo'shish
      const handleAddToCart = (product, qty = 1) => {
        const exist = cart.find(item => item.id === product.id);
        if (exist) {
          setCart(cart.map(item => item.id === product.id ? { ...exist, quantity: exist.quantity + qty } : item));
        } else {
          setCart([...cart, { ...product, quantity: qty, chosenSize: selectedSize, chosenColor: selectedColor }]);
        }
      };

      // Savatchada miqdorni o'zgartirish
      const updateQty = (id, change) => {
        setCart(cart.map(item => {
          if (item.id === id) {
            const newQty = item.quantity + change;
            return newQty > 0 ? { ...item, quantity: newQty } : null;
          }
          return item;
        }).filter(Boolean));
      };

      // Sevimlilarga qo'shish/o'chirish
      const toggleFavorite = (prod) => {
        if (favorites.some(f => f.id === prod.id)) {
          setFavorites(favorites.filter(f => f.id !== prod.id));
        } else {
          setFavorites([...favorites, prod]);
        }
      };

      // Buyurtma berish (Checkout) Telegram integratsiyasi bilan
      const handleCheckout = async (e) => {
        e.preventDefault();
        if (!orderName || !orderPhone || !orderAddress) {
          alert("Iltimos barcha ma'lumotlarni to'ldiring!");
          return;
        }

        const jamiSumma = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const orderText = cart.map(item => `🧸 ${item.name} (O'lcham: ${item.chosenSize}, Rang: ${item.chosenColor}) x ${item.quantity} - ${item.price.toLocaleString()} so'm`).join('\n');

        const message = `
👶 *LAYLO KIDS - YANGI BUYURTMA!*
━━━━━━━━━━━━━━━━━━
👤 *Mijoz:* ${orderName}
📞 *Telefon:* ${orderPhone}
📍 *Manzil:* ${orderAddress}

📦 *Buyurtmalar:*
${orderText}

💰 *Jami summa:* ${jamiSumma.toLocaleString()} so'm
━━━━━━━━━━━━━━━━━━
        `;

        try {
          // Supabase-ga yozish
          await supabaseClient.from('sales').insert([{
            customer_name: orderName,
            customer_phone: orderPhone,
            customer_address: orderAddress,
            total: jamiSumma,
            status: 'yangi'
          }]);

          // Telegramga yuborish
          await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'Markdown' })
          });

          alert("Sizning buyurtmangiz muvaffaqiyatli qabul qilindi!");
          setCart([]);
          setOrderName('');
          setOrderPhone('');
          setOrderAddress('');
          setCurrentScreen('home');
        } catch (err) {
          alert("Buyurtma yuborildi!");
          setCart([]);
          setCurrentScreen('home');
        }
      };

      return (
        <div className="w-full flex flex-col h-full bg-white relative">
          
          {/* SCREEN 1: BOSH SAHIFA (HOME) */}
          {currentScreen === 'home' && (
            <div className="flex-1 pb-24 overflow-y-auto no-scrollbar">
              {/* Header */}
              <div className="px-5 pt-4 pb-2 flex justify-between items-center bg-white sticky top-0 z-10">
                <button className="text-slate-800 focus:outline-none">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div className="text-center">
                  <h1 className="text-2xl font-extrabold text-brand-pink tracking-tight italic" style={{fontFamily: 'Playfair Display'}}>Laylo Kids</h1>
                  <p className="text-[10px] text-brand-gray tracking-widest font-bold uppercase -mt-1">Ayollar va bolalar uchun</p>
                </div>
                <div className="relative cursor-pointer" onClick={() => setCurrentScreen('cart')}>
                  <svg className="w-6 h-6 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                  {cart.length > 0 && (
                    <span className="absolute -top-1.5 -right-1.5 bg-brand-pink text-white text-[9px] font-black w-4.5 h-4.5 rounded-full flex items-center justify-center border-2 border-white">{cart.reduce((sum, i) => sum + i.quantity, 0)}</span>
                  )}
                </div>
              </div>

              {/* Banner (50% Chegirma) */}
              <div className="px-4 mt-3">
                <div className="bg-[#FFF0F5] rounded-[32px] p-6 relative overflow-hidden flex items-center min-h-[170px] shadow-sm">
                  <div className="z-10 max-w-[55%]">
                    <span className="text-xs font-bold text-brand-pink uppercase tracking-wider block mb-1">Yozgi Chegirmalar</span>
                    <h2 className="text-lg font-black text-slate-800 uppercase leading-tight">Hammasiga</h2>
                    <h3 className="text-4xl font-extrabold text-brand-pink tracking-tight my-1">-50%</h3>
                    <button onClick={() => setCurrentScreen('category')} className="mt-2 bg-brand-pink hover:bg-[#e03d73] text-white text-[11px] font-extrabold px-4 py-2 rounded-full transition-all duration-200">Endi xarid qiling</button>
                  </div>
                  {/* Banner rasm qismi */}
                  <div className="absolute right-0 bottom-0 top-0 w-[48%] bg-cover bg-center rounded-r-[32px]" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1503919545889-aef636e10ad4?w=400')` }}></div>
                </div>
              </div>

              {/* Qidiruv tizimi */}
              <div className="px-4 mt-4">
                <div className="relative flex items-center">
                  <span className="absolute left-4 text-slate-400">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  </span>
                  <input 
                    type="text" 
                    placeholder="Mahsulot qidirish..." 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3.5 pl-11 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink/20 transition-all text-slate-800"
                  />
                  <button className="absolute right-4 text-slate-500">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                  </button>
                </div>
              </div>

              {/* Kategoriyalar */}
              <div className="mt-5">
                <div className="px-4 flex justify-between items-center mb-3">
                  <h3 className="font-extrabold text-slate-800 text-base">Kategoriyalar</h3>
                  <button onClick={() => setCurrentScreen('category')} className="text-xs font-bold text-brand-pink flex items-center gap-0.5">Barchasi <span className="text-xs">&rsaquo;</span></button>
                </div>
                <div className="flex gap-3.5 overflow-x-auto px-4 pb-2 no-scrollbar">
                  {[
                    { id: 'ayollar', name: "Ayollar kiyimi", count: "1200+", img: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=150" },
                    { id: 'bolalar', name: "Bolalar kiyimi", count: "1500+", img: "https://images.unsplash.com/photo-1503919545889-aef636e10ad4?w=150" },
                    { id: 'aksesuarlar', name: "Aksessuarlar", count: "800+", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=150" },
                    { id: 'poyabzal', name: "Oyoq kiyim", count: "600+", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=150" }
                  ].map(cat => (
                    <div key={cat.id} onClick={() => setCurrentScreen('category')} className="bg-slate-50 min-w-[95px] rounded-3xl p-3 flex flex-col items-center cursor-pointer hover:shadow-sm transition-all border border-slate-100/50">
                      <div className="w-16 h-16 rounded-2xl overflow-hidden mb-2">
                        <img src={cat.img} className="w-full h-full object-cover" />
                      </div>
                      <span className="text-[10px] font-extrabold text-slate-800 text-center line-clamp-1">{cat.name}</span>
                      <span className="text-[9px] text-slate-400 font-bold mt-0.5">{cat.count}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Mashhur mahsulotlar */}
              <div className="mt-5">
                <div className="px-4 flex justify-between items-center mb-3">
                  <h3 className="font-extrabold text-slate-800 text-base">Mashhur mahsulotlar</h3>
                  <button onClick={() => setCurrentScreen('category')} className="text-xs font-bold text-brand-pink flex items-center gap-0.5">Barchasi <span className="text-xs">&rsaquo;</span></button>
                </div>
                <div className="flex gap-4 overflow-x-auto px-4 pb-2 no-scrollbar">
                  {products.map(prod => (
                    <div key={prod.id} className="min-w-[155px] max-w-[155px] bg-white rounded-[24px] overflow-hidden border border-slate-100 flex flex-col justify-between">
                      <div className="relative h-44 bg-slate-100 cursor-pointer" onClick={() => { setSelectedProduct(prod); setCurrentScreen('detail'); }}>
                        <img src={prod.image_url} className="w-full h-full object-cover" />
                        <span className="absolute top-2.5 left-2.5 bg-brand-pink text-white text-[9px] font-black px-2 py-0.5 rounded-full">-{prod.discount}%</span>
                        <button onClick={(e) => { e.stopPropagation(); toggleFavorite(prod); }} className="absolute top-2.5 right-2.5 w-7 h-7 bg-white rounded-full flex items-center justify-center text-slate-400 hover:text-brand-pink shadow-sm">
                          <svg className={`w-4 h-4 ${favorites.some(f => f.id === prod.id) ? 'fill-brand-pink text-brand-pink' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>
                      </div>
                      <div className="p-3 flex flex-col justify-between flex-1">
                        <div>
                          <h4 className="text-xs font-extrabold text-slate-800 line-clamp-1">{prod.name}</h4>
                          <span className="text-[10px] text-slate-400 font-bold">Yozgi kolleksiya</span>
                          <div className="mt-1">
                            <span className="text-[9px] text-slate-400 line-through block leading-none">{prod.old_price.toLocaleString()} so'm</span>
                            <span className="text-xs font-black text-brand-pink block">{prod.price.toLocaleString()} so'm</span>
                          </div>
                        </div>
                        <button onClick={() => handleAddToCart(prod)} className="mt-2.5 w-full bg-[#FFF0F5] hover:bg-brand-pink hover:text-white text-brand-pink text-[11px] font-extrabold py-2 rounded-xl transition-all duration-200 flex items-center justify-center gap-1.5">
                          🛒 Savatga
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Yangi Kelganlar qismi */}
              <div className="mt-5">
                <div className="px-4 flex justify-between items-center mb-3">
                  <h3 className="font-extrabold text-slate-800 text-base">Yangi kelganlar</h3>
                  <button onClick={() => setCurrentScreen('category')} className="text-xs font-bold text-brand-pink">Barchasi &rsaquo;</button>
                </div>
                <div className="grid grid-cols-4 gap-2.5 px-4">
                  {[
                    "https://images.unsplash.com/photo-1519457431-44ccd64a579b?w=150",
                    "https://images.unsplash.com/photo-1503919545889-aef636e10ad4?w=150",
                    "https://images.unsplash.com/photo-1519244703995-f4e0f30006d5?w=150",
                    "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=150"
                  ].map((imgUrl, index) => (
                    <div key={index} className="aspect-square rounded-2xl overflow-hidden bg-slate-100 border border-slate-100">
                      <img src={imgUrl} className="w-full h-full object-cover" />
                    </div>
                  ))}
                </div>
              </div>

              {/* Xizmatlar / Kafolatlar */}
              <div className="px-4 mt-6">
                <div className="bg-slate-50 border border-slate-100/50 rounded-2xl p-4 flex justify-between items-center text-center">
                  <div>
                    <span className="text-lg block">🚚</span>
                    <span className="text-[10px] font-extrabold text-slate-800 block">Tez yetkazish</span>
                    <span className="text-[8px] text-slate-400 block font-semibold">1-2 kun ichida</span>
                  </div>
                  <div className="w-px h-8 bg-slate-200"></div>
                  <div>
                    <span className="text-lg block">🛡️</span>
                    <span className="text-[10px] font-extrabold text-slate-800 block">Sifat kafolati</span>
                    <span className="text-[8px] text-slate-400 block font-semibold">100% original</span>
                  </div>
                  <div className="w-px h-8 bg-slate-200"></div>
                  <div>
                    <span className="text-lg block">🔄</span>
                    <span className="text-[10px] font-extrabold text-slate-800 block">Oson qaytarish</span>
                    <span className="text-[8px] text-slate-400 block font-semibold">7 kun ichida</span>
                  </div>
                </div>
              </div>

            </div>
          )}

          {/* SCREEN 2: KATEGORIYA / FILTR SAHIFA */}
          {currentScreen === 'category' && (
            <div className="flex-1 pb-24 overflow-y-auto no-scrollbar bg-white">
              {/* Header */}
              <div className="px-4 pt-4 pb-2 flex items-center justify-between sticky top-0 bg-white z-10 border-b border-slate-50">
                <button onClick={() => setCurrentScreen('home')} className="w-9 h-9 flex items-center justify-center rounded-full bg-slate-50 hover:bg-slate-100 text-slate-800 transition">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h2 className="text-base font-extrabold text-slate-800">Ayollar kiyimi</h2>
                <button className="w-9 h-9 flex items-center justify-center rounded-full bg-slate-50 text-slate-800">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
              </div>

              {/* Kichik Sub-kategoriyalar */}
              <div className="flex gap-2.5 overflow-x-auto px-4 py-3.5 no-scrollbar">
                {[
                  { name: "Barchasi", active: true },
                  { name: "Ko'ylaklar", active: false },
                  { name: "Pidjaklar", active: false },
                  { name: "Futbolkalar", active: false },
                  { name: "Boshqalar", active: false }
                ].map((item, idx) => (
                  <button key={idx} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition ${item.active ? 'bg-brand-pink text-white shadow-sm' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                    {item.name}
                  </button>
                ))}
              </div>

              {/* Saralash va Filtr bar */}
              <div className="px-4 pb-3 flex justify-between items-center text-xs text-slate-500 font-bold border-b border-slate-50">
                <button className="flex items-center gap-1.5 bg-slate-50 px-3 py-1.5 rounded-lg">
                  Saralash 
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <button className="flex items-center gap-1.5 bg-slate-50 px-3 py-1.5 rounded-lg">
                  Filtr 
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10"></path></svg>
                </button>
              </div>

              {/* Mahsulotlar to'ri (Grid) */}
              <div className="grid grid-cols-2 gap-3.5 p-4">
                {products.map(prod => (
                  <div key={prod.id} className="bg-white rounded-[24px] overflow-hidden border border-slate-100 flex flex-col justify-between">
                    <div className="relative h-44 bg-slate-50 cursor-pointer" onClick={() => { setSelectedProduct(prod); setCurrentScreen('detail'); }}>
                      <img src={prod.image_url} className="w-full h-full object-cover" />
                      <span className="absolute top-2.5 left-2.5 bg-brand-pink text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">-{prod.discount}%</span>
                      <button onClick={(e) => { e.stopPropagation(); toggleFavorite(prod); }} className="absolute top-2.5 right-2.5 w-7 h-7 bg-white rounded-full flex items-center justify-center text-slate-400 hover:text-brand-pink shadow-sm">
                        <svg className={`w-3.5 h-3.5 ${favorites.some(f => f.id === prod.id) ? 'fill-brand-pink text-brand-pink' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                      </button>
                    </div>
                    <div className="p-3 flex-1 flex flex-col justify-between">
                      <div>
                        <h4 className="text-xs font-extrabold text-slate-800 line-clamp-1">{prod.name}</h4>
                        <p className="text-[10px] text-slate-400 font-semibold mt-0.5">Yozgi kolleksiya</p>
                        <div className="mt-1">
                          <span className="text-[9px] text-slate-400 line-through block leading-none">{prod.old_price.toLocaleString()} so'm</span>
                          <span className="text-xs font-black text-brand-pink block">{prod.price.toLocaleString()} so'm</span>
                        </div>
                      </div>
                      <button onClick={() => handleAddToCart(prod)} className="mt-2.5 w-full bg-brand-pink text-white text-[11px] font-extrabold py-2 rounded-xl transition hover:bg-[#e03d73] flex items-center justify-center gap-1">
                        🛒 Savatga qo'shish
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* SCREEN 3: MAHSULOT BATAFSIL (DETAIL) */}
          {currentScreen === 'detail' && selectedProduct && (
            <div className="flex-1 pb-24 overflow-y-auto no-scrollbar bg-white">
              {/* Rasm va Top Bar */}
              <div className="relative h-[380px] bg-slate-100">
                <img src={selectedProduct.image_url} className="w-full h-full object-cover" />
                
                {/* Header buttons overlay */}
                <div className="absolute top-4 left-4 right-4 flex justify-between items-center">
                  <button onClick={() => setCurrentScreen('home')} className="w-9 h-9 flex items-center justify-center rounded-full bg-white/80 backdrop-blur-md text-slate-800 shadow-sm">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                  </button>
                  <div className="flex gap-2">
                    <button className="w-9 h-9 flex items-center justify-center rounded-full bg-white/80 backdrop-blur-md text-slate-800 shadow-sm">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 10.742l4.684-2.677m0 7.87l-4.684-2.677m8.904-4.823a3 3 0 11-6 0 3 3 0 016 0zm-6 8.953a3 3 0 11-6 0 3 3 0 016 0zm6-8.953a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                    <button onClick={() => toggleFavorite(selectedProduct)} className="w-9 h-9 flex items-center justify-center rounded-full bg-white/80 backdrop-blur-md shadow-sm text-slate-800">
                      <svg className={`w-5 h-5 ${favorites.some(f => f.id === selectedProduct.id) ? 'fill-brand-pink text-brand-pink' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    </button>
                  </div>
                </div>

                {/* Slayd indikatori */}
                <div className="absolute bottom-4 right-4 bg-black/40 text-white text-[10px] font-extrabold px-2.5 py-1 rounded-full">
                  1/5
                </div>
              </div>

              {/* Mahsulot Ma'lumotlari */}
              <div className="p-5 space-y-4">
                <div>
                  <h2 className="text-xl font-extrabold text-slate-800 leading-tight">{selectedProduct.name}</h2>
                  <p className="text-xs font-bold text-slate-400 mt-1">Yozgi kolleksiya</p>
                  
                  {/* Reyting */}
                  <div className="flex items-center gap-1.5 mt-2">
                    <span className="text-amber-400 text-sm">★</span>
                    <span className="text-xs font-extrabold text-slate-800">4.8</span>
                    <span className="text-xs text-slate-400">(125 ta baho)</span>
                    <span className="text-xs text-slate-400 ml-auto font-bold">Kod: {selectedProduct.code}</span>
                  </div>
                </div>

                {/* Narxlar bo'limi */}
                <div className="flex items-baseline gap-2 pt-1">
                  <span className="text-xl font-black text-brand-pink">{selectedProduct.price.toLocaleString()} so'm</span>
                  <span className="text-xs text-slate-400 line-through">{selectedProduct.old_price.toLocaleString()} so'm</span>
                  <span className="bg-brand-pink/10 text-brand-pink text-[9px] font-black px-2 py-0.5 rounded-md">-{selectedProduct.discount}%</span>
                </div>

                {/* O'lcham tanlash */}
                <div>
                  <h4 className="text-xs font-extrabold text-slate-800 mb-2.5">O'lcham</h4>
                  <div className="flex gap-2">
                    {['S', 'M', 'L', 'XL'].map(size => (
                      <button 
                        key={size} 
                        onClick={() => setSelectedSize(size)}
                        className={`w-10 h-10 rounded-xl font-bold text-xs flex items-center justify-center transition border ${selectedSize === size ? 'bg-brand-pink text-white border-brand-pink' : 'border-slate-100 hover:bg-slate-50 text-slate-700'}`}
                      >
                        {size}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Rang tanlash */}
                <div>
                  <h4 className="text-xs font-extrabold text-slate-800 mb-2.5">Rang</h4>
                  <div className="flex gap-3">
                    {[
                      { name: 'Pushti', class: 'bg-[#FF4E88]' },
                      { name: 'Yashil', class: 'bg-[#A2E9AC]' },
                      { name: 'Moviy', class: 'bg-[#BCD2EE]' },
                      { name: 'Sariq', class: 'bg-[#FFE2A0]' }
                    ].map(color => (
                      <button 
                        key={color.name}
                        onClick={() => setSelectedColor(color.name)}
                        className={`w-7 h-7 rounded-full ${color.class} flex items-center justify-center transition ring-offset-2 ${selectedColor === color.name ? 'ring-2 ring-brand-pink scale-110' : ''}`}
                      >
                        {selectedColor === color.name && <span className="text-white text-[10px]">✓</span>}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Mahsulot haqida ma'lumot */}
                <div className="pt-2">
                  <h4 className="text-xs font-extrabold text-slate-800 mb-1.5">Mahsulot tavsifi</h4>
                  <p className="text-xs text-slate-500 leading-relaxed font-semibold">{selectedProduct.description}</p>
                </div>

                {/* Savatchaga qo'shish harakat tugmasi */}
                <div className="flex gap-3 pt-4">
                  <button onClick={() => { handleAddToCart(selectedProduct); alert("Savatchaga qo'shildi!"); }} className="w-12 h-12 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-100">
                    🛒
                  </button>
                  <button 
                    onClick={() => { handleAddToCart(selectedProduct); setCurrentScreen('cart'); }} 
                    className="flex-1 bg-brand-pink hover:bg-[#e03d73] text-white font-extrabold text-xs py-3.5 rounded-2xl transition shadow-lg shadow-brand-pink/20"
                  >
                    Savatchaga qo'shish
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* SCREEN 4: SAVATCHA / RASMIYLASHTIRISH */}
          {currentScreen === 'cart' && (
            <div className="flex-1 pb-24 overflow-y-auto no-scrollbar bg-white p-5">
              <div className="flex items-center gap-3 mb-6">
                <button onClick={() => setCurrentScreen('home')} className="w-9 h-9 flex items-center justify-center rounded-full bg-slate-50 text-slate-800">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h2 className="text-base font-extrabold text-slate-800">Xaridlar savatchasi</h2>
              </div>

              {cart.length === 0 ? (
                <div className="text-center py-16">
                  <span className="text-5xl block mb-3">🛍️</span>
                  <p className="text-sm font-bold text-slate-400">Savatchangiz hali bo'sh</p>
                  <button onClick={() => setCurrentScreen('home')} className="mt-4 bg-brand-pink text-white text-xs font-bold px-5 py-2.5 rounded-xl">Xarid qilish</button>
                </div>
              ) : (
                <div className="space-y-4">
                  {cart.map(item => (
                    <div key={item.id} className="flex gap-3 pb-3 border-b border-slate-100">
                      <div className="w-16 h-20 rounded-xl overflow-hidden bg-slate-100">
                        <img src={item.image_url} className="w-full h-full object-cover" />
                      </div>
                      <div className="flex-1 flex flex-col justify-between">
                        <div>
                          <h4 className="text-xs font-extrabold text-slate-800">{item.name}</h4>
                          <span className="text-[10px] text-slate-400 font-bold">O'lcham: {item.chosenSize} | Rang: {item.chosenColor}</span>
                        </div>
                        <span className="text-xs font-black text-brand-pink">{(item.price * item.quantity).toLocaleString()} so'm</span>
                      </div>
                      {/* Plus/Minus */}
                      <div className="flex flex-col justify-between items-end">
                        <button onClick={() => updateQty(item.id, -1)} className="w-6 h-6 rounded-md bg-slate-50 flex items-center justify-center font-bold text-slate-600 hover:bg-slate-100">-</button>
                        <span className="text-xs font-bold">{item.quantity}</span>
                        <button onClick={() => updateQty(item.id, 1)} className="w-6 h-6 rounded-md bg-slate-50 flex items-center justify-center font-bold text-slate-600 hover:bg-slate-100">+</button>
                      </div>
                    </div>
                  ))}

                  {/* Buyurtma Formasi */}
                  <form onSubmit={handleCheckout} className="pt-4 space-y-3.5">
                    <h3 className="text-xs font-extrabold text-slate-800 uppercase tracking-wider mb-2">Buyurtma berish</h3>
                    
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-1">Ism va Familiya</label>
                      <input required type="text" value={orderName} onChange={(e) => setOrderName(e.target.value)} placeholder="Masalan: Laylo Aliyeva" className="w-full border border-slate-200 rounded-xl p-3 text-xs focus:ring-1 focus:ring-brand-pink focus:outline-none" />
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-1">Telefon raqam</label>
                      <input required type="text" value={orderPhone} onChange={(e) => setOrderPhone(e.target.value)} placeholder="+998" className="w-full border border-slate-200 rounded-xl p-3 text-xs focus:ring-1 focus:ring-brand-pink focus:outline-none" />
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-1">Manzil</label>
                      <input required type="text" value={orderAddress} onChange={(e) => setOrderAddress(e.target.value)} placeholder="Toshkent shahar, Yunusobod d-7" className="w-full border border-slate-200 rounded-xl p-3 text-xs focus:ring-1 focus:ring-brand-pink focus:outline-none" />
                    </div>

                    {/* Jami va Tasdiqlash */}
                    <div className="bg-slate-50 p-4 rounded-2xl mt-4 space-y-2">
                      <div className="flex justify-between text-xs text-slate-500 font-bold">
                        <span>Mahsulotlar jami:</span>
                        <span>{cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toLocaleString()} so'm</span>
                      </div>
                      <div className="flex justify-between text-xs text-slate-500 font-bold">
                        <span>Yetkazib berish:</span>
                        <span>Bepul</span>
                      </div>
                      <div className="w-full h-px bg-slate-200 my-1"></div>
                      <div className="flex justify-between text-sm font-extrabold text-slate-800">
                        <span>Jami summa:</span>
                        <span className="text-brand-pink">{cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toLocaleString()} so'm</span>
                      </div>
                    </div>

                    <button type="submit" className="w-full bg-brand-pink hover:bg-[#e03d73] text-white text-xs font-extrabold py-4 rounded-2xl transition shadow-lg shadow-brand-pink/15">
                      Buyurtmani tasdiqlash
                    </button>
                  </form>
                </div>
              )}
            </div>
          )}

          {/* SCREEN 5: BUYURTMALAR / STATISTIKA */}
          {currentScreen === 'orders' && (
            <div className="flex-1 pb-24 overflow-y-auto no-scrollbar bg-white p-5">
              <h2 className="text-base font-extrabold text-slate-800 mb-4">Mening Buyurtmalarim</h2>
              <div className="text-center py-16">
                <span className="text-5xl block mb-2">📦</span>
                <p className="text-sm font-bold text-slate-400">Sizda hali buyurtmalar mavjud emas.</p>
              </div>
            </div>
          )}

          {/* SCREEN 6: FAVORITES */}
          {currentScreen === 'favorites' && (
            <div className="flex-1 pb-24 overflow-y-auto no-scrollbar bg-white p-5">
              <h2 className="text-base font-extrabold text-slate-800 mb-4">Saralanganlar</h2>
              {favorites.length === 0 ? (
                <div className="text-center py-16">
                  <span className="text-5xl block mb-2">❤️</span>
                  <p className="text-sm font-bold text-slate-400">Hech narsa saqlanmagan.</p>
                </div>
              ) : (
                <div className="grid grid-cols-2 gap-3.5">
                  {favorites.map(prod => (
                    <div key={prod.id} className="bg-white rounded-[24px] overflow-hidden border border-slate-100 flex flex-col justify-between">
                      <div className="relative h-44 bg-slate-50 cursor-pointer" onClick={() => { setSelectedProduct(prod); setCurrentScreen('detail'); }}>
                        <img src={prod.image_url} className="w-full h-full object-cover" />
                        <button onClick={(e) => { e.stopPropagation(); toggleFavorite(prod); }} className="absolute top-2.5 right-2.5 w-7 h-7 bg-white rounded-full flex items-center justify-center text-brand-pink shadow-sm">
                          ❤️
                        </button>
                      </div>
                      <div className="p-3">
                        <h4 className="text-xs font-extrabold text-slate-800 line-clamp-1">{prod.name}</h4>
                        <span className="text-xs font-black text-brand-pink block mt-1">{prod.price.toLocaleString()} so'm</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* =======================================================
              🛍️ DO'KONNING PASTKI (BOTTOM NAV) NAVIGATSIYA PANELI
          ======================================================= */}
          <div className="absolute bottom-0 left-0 right-0 h-20 bg-white/95 backdrop-blur-lg border-t border-slate-100 flex items-center justify-around px-4 z-20 sm:rounded-b-[40px]">
            <button onClick={() => setCurrentScreen('home')} className={`flex flex-col items-center justify-center w-12 h-12 transition ${currentScreen === 'home' ? 'text-brand-pink scale-110' : 'text-slate-400 hover:text-slate-600'}`}>
              <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
              <span className="text-[9px] font-extrabold mt-1">Bosh sahifa</span>
            </button>

            <button onClick={() => setCurrentScreen('favorites')} className={`flex flex-col items-center justify-center w-12 h-12 transition ${currentScreen === 'favorites' ? 'text-brand-pink scale-110' : 'text-slate-400 hover:text-slate-600'}`}>
              <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
              <span className="text-[9px] font-extrabold mt-1">Sevimli</span>
            </button>

            {/* Savat o'rtadagi katta tugma */}
            <button onClick={() => setCurrentScreen('cart')} className={`relative flex flex-col items-center justify-center w-14 h-14 bg-brand-pink rounded-full text-white shadow-lg shadow-brand-pink/20 -mt-6 border-4 border-white transition hover:scale-105`}>
              <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
              {cart.length > 0 && (
                <span className="absolute top-0 right-0 bg-slate-800 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center border border-white">{cart.reduce((sum, i) => sum + i.quantity, 0)}</span>
              )}
            </button>

            <button onClick={() => setCurrentScreen('orders')} className={`flex flex-col items-center justify-center w-12 h-12 transition ${currentScreen === 'orders' ? 'text-brand-pink scale-110' : 'text-slate-400 hover:text-slate-600'}`}>
              <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
              <span className="text-[9px] font-extrabold mt-1">Buyurtmalar</span>
            </button>

            <button onClick={() => alert("Profil bo'limi ishlab chiqilmoqda...")} className="flex flex-col items-center justify-center w-12 h-12 text-slate-400 hover:text-slate-600">
              <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
              <span className="text-[9px] font-extrabold mt-1">Profil</span>
            </button>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
