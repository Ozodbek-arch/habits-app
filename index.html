<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laylo Kids - Bolalar kiyimlari do'koni</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: {
              50: '#fff5f7', 100: '#ffe4ec', 200: '#ffc9dd', 300: '#ffa3c0',
              400: '#ff6f9e', 500: '#f74889', 600: '#e02970', 700: '#bc1a5c',
              800: '#9c1a4f', 900: '#831a47',
            },
            blush: {
              50: '#fdf7f5', 100: '#faece8', 200: '#f4d5cd', 300: '#ecbaad',
              400: '#e29584', 500: '#d27563', 600: '#bd5a48', 700: '#9d4435',
              800: '#7e3a2e', 900: '#68322a',
            }
          },
          fontFamily: {
            sans: ['"Nunito Sans"', 'system-ui', 'sans-serif'],
            display: ['"Playfair Display"', 'Georgia', 'serif'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <style>
    body {
      font-family: 'Nunito Sans', sans-serif;
      background-color: #fff5f7;
    }
    .pattern-bg {
      background-color: #fff5f7;
      background-image: radial-gradient(#ffc9dd 0.8px, transparent 0.8px), radial-gradient(#ffc9dd 0.8px, #fff5f7 0.8px);
      background-size: 32px 32px;
      background-position: 0 0, 16px 16px;
    }
  </style>
</head>
<body class="pattern-bg min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =======================================================
    // ⚙️ SOZLAMALARNI O'ZINGIZNIKIGA ALMASHTIRING
    // =======================================================
    const SUPABASE_URL = "https://your-supabase-project.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.your-key-here"; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TELEGRAM_BOT_TOKEN = "YOUR_BOT_TOKEN";
    const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID";

    // =======================================================
    // LAYLO KIDS ILOVA KODI
    // =======================================================
    function App() {
      const [view, setView] = useState('shop'); // 'shop' yoki 'admin'
      const [adminTab, setAdminTab] = useState('products'); // 'products', 'warehouse', 'sales', 'stats'
      const [categories, setCategories] = useState([]);
      const [products, setProducts] = useState([]);
      const [sales, setSales] = useState([]);
      const [cart, setCart] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');

      // Buyurtma formasi holati
      const [checkoutOpen, setCheckoutOpen] = useState(false);
      const [custName, setCustName] = useState('');
      const [custPhone, setCustPhone] = useState('');
      const [custAddress, setCustAddress] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('naqd');

      // Admin Tahrirlash holatlari
      const [showCatModal, setShowCatModal] = useState(false);
      const [catNameInput, setCatNameInput] = useState('');
      const [showProdModal, setShowProdModal] = useState(false);
      
      // Yangi maxsulot formasi o'zgaruvchilari
      const [prodName, setProdName] = useState('');
      const [prodPrice, setProdPrice] = useState('');
      const [prodCost, setProdCost] = useState('');
      const [prodCat, setProdCat] = useState('');
      const [prodStock, setProdStock] = useState('');
      const [prodSize, setProdSize] = useState('');
      const [prodColor, setProdColor] = useState('');
      const [prodImage, setProdImage] = useState('');

      useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data: cats } = await supabaseClient.from('categories').select('*');
          const { data: prods } = await supabaseClient.from('products').select('*');
          const { data: sles } = await supabaseClient.from('sales').select('*, sale_items(*)').order('created_at', { ascending: false });
          
          if (cats) setCategories(cats);
          if (prods) setProducts(prods);
          if (sles) setSales(sles);
        } catch (err) {
          console.error("Ma'lumot yuklashda xato:", err);
        }
      };

      // ================= SAVATCHA AMALLARI =================
      const addToCart = (product) => {
        const exist = cart.find(x => x.id === product.id);
        if (exist) {
          setCart(cart.map(x => x.id === product.id ? { ...exist, quantity: exist.quantity + 1 } : x));
        } else {
          setCart([...cart, { ...product, quantity: 1 }]);
        }
      };

      const updateCartQty = (id, amount) => {
        setCart(cart.map(item => {
          if (item.id === id) {
            const newQty = item.quantity + amount;
            return newQty > 0 ? { ...item, quantity: newQty } : null;
          }
          return item;
        }).filter(Boolean));
      };

      // ================= BUYURTMA BERISH (CHECKOUT) =================
      const handleCheckout = async (e) => {
        e.preventDefault();
        if (!custName || !custPhone || !custAddress) {
          alert("Iltimos, barcha maydonlarni to'ldiring!");
          return;
        }

        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

        try {
          // 1. Supabase-ga sotuvni yozish
          const { data: sale, error: saleErr } = await supabaseClient.from('sales').insert([{
            customer_name: custName,
            customer_phone: custPhone,
            customer_address: custAddress,
            total: total,
            status: 'yangi',
            payment_method: paymentMethod
          }]).select().single();

          if (saleErr) throw saleErr;

          // 2. Sotilgan tovarlarni sale_items jadvaliga qo'shish
          const itemsToInsert = cart.map(item => ({
            sale_id: sale.id,
            product_id: item.id,
            product_name: item.name,
            price: item.price,
            quantity: item.quantity,
            subtotal: item.price * item.quantity
          }));

          const { error: itemsErr } = await supabaseClient.from('sale_items').insert(itemsToInsert);
          if (itemsErr) throw itemsErr;

          // 3. Omborxonadagi sonini (stock) kamaytirish
          for (let item of cart) {
            await supabaseClient.rpc('decrement_stock', { 
              row_id: item.id, 
              quant: item.quantity 
            });
          }

          // 4. Telegram Botga xabar yuborish
          const cartText = cart.map(item => `🧸 ${item.name} (${item.size || '-'}) x ${item.quantity} - ${(item.price * item.quantity).toLocaleString()} so'm`).join('\n');
          const tgMsg = `
👶 *LAYLO KIDS - YANGI BUYURTMA!*
━━━━━━━━━━━━━━━━━━
👤 *Mijoz:* ${custName}
📞 *Telefon:* ${custPhone}
📍 *Manzil:* ${custAddress}
💳 *To'lov:* ${paymentMethod.toUpperCase()}

📦 *Maxsulotlar:*
${cartText}

💰 *Jami to'lov:* ${total.toLocaleString()} so'm
━━━━━━━━━━━━━━━━━━
          `;

          await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              chat_id: TELEGRAM_CHAT_ID,
              text: tgMsg,
              parse_mode: "Markdown"
            })
          });

          alert("Buyurtmangiz muvaffaqiyatli qabul qilindi!");
          setCart([]);
          setCheckoutOpen(false);
          setCartOpen(false);
          loadData();

        } catch (err) {
          alert("Buyurtmada xatolik yuz berdi: " + err.message);
        }
      };

      // ================= ADMIN: MAHSULOT QO'SHISH =================
      const handleCreateProduct = async (e) => {
        e.preventDefault();
        if (!prodName || !prodPrice || !prodCat) {
          alert("Majburiy maydonlarni to'ldiring!");
          return;
        }

        try {
          const { error } = await supabaseClient.from('products').insert([{
            name: prodName,
            price: parseFloat(prodPrice),
            cost: parseFloat(prodCost) || 0,
            category_id: prodCat,
            stock: parseInt(prodStock) || 0,
            size: prodSize,
            color: prodColor,
            image_url: prodImage || "https://images.unsplash.com/photo-1515488042361-404e9250afef?w=400"
          }]);

          if (error) throw error;
          
          setShowProdModal(false);
          // formani tozalash
          setProdName(''); setProdPrice(''); setProdCost(''); setProdCat(''); setProdStock(''); setProdSize(''); setProdColor(''); setProdImage('');
          loadData();
        } catch (err) {
          alert("Saqlashda xato yuz berdi: " + err.message);
        }
      };

      // ================= ADMIN: KATALOG QO'SHISH =================
      const handleCreateCategory = async (e) => {
        e.preventDefault();
        if (!catNameInput.trim()) return;

        try {
          const { error } = await supabaseClient.from('categories').insert([{ name: catNameInput, icon: "👶" }]);
          if (error) throw error;
          setCatNameInput('');
          setShowCatModal(false);
          loadData();
        } catch (err) {
          alert(err.message);
        }
      };

      // Filtrlar
      const filteredProducts = products.filter(p => {
        const matchesCategory = selectedCategory === 'all' || p.category_id === selectedCategory;
        const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return (
        <div className="safe-bottom">
          
          {/* HEADER */}
          <header className="bg-white/95 backdrop-blur-md sticky top-0 z-40 border-b border-rose-100 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
              <div className="flex items-center gap-2">
                <span className="text-3xl">🧸</span>
                <div>
                  <h1 className="text-2xl font-display font-extrabold text-rose-600 tracking-tight">Laylo Kids</h1>
                  <p className="text-xs text-rose-400 font-bold">Premium bolalar kiyimlari</p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {view === 'shop' ? (
                  <>
                    <button 
                      onClick={() => setView('admin')}
                      className="bg-rose-50 text-rose-600 hover:bg-rose-100 px-4 py-2 rounded-2xl text-sm font-extrabold transition"
                    >
                      ⚙️ Admin
                    </button>
                    <button 
                      onClick={() => setCartOpen(true)}
                      className="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-2xl text-sm font-extrabold flex items-center gap-2 transition shadow-md shadow-rose-200"
                    >
                      🛒 ({cart.reduce((sum, x) => sum + x.quantity, 0)})
                    </button>
                  </>
                ) : (
                  <button 
                    onClick={() => setView('shop')}
                    className="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-2xl text-sm font-extrabold flex items-center gap-1.5 transition"
                  >
                    ⬅️ Do'konga qaytish
                  </button>
                )}
              </div>
            </div>
          </header>

          {/* MAIN CONTAINER */}
          <main className="max-w-6xl mx-auto px-4 py-6">
            
            {view === 'shop' ? (
              // =======================================================
              // MIJOZ DO'KON EKRANI
              // =======================================================
              <div className="space-y-6">
                
                {/* Banner */}
                <div className="bg-gradient-to-r from-rose-400 to-pink-500 rounded-3xl p-6 text-white shadow-xl shadow-rose-100 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div>
                    <h2 className="text-3xl font-display font-bold">Yozgi yangi to'plam! ☀️</h2>
                    <p className="text-sm opacity-90 mt-1 max-w-md">Farzandlaringiz uchun eng sifatli va qulay kiyimlar faqat bizda.</p>
                  </div>
                  <span className="text-5xl animate-bounce">🎈</span>
                </div>

                {/* Qidiruv bar */}
                <div className="flex gap-2">
                  <input 
                    type="text" 
                    placeholder="Kiyimlar bo'yicha qidirish..." 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="flex-1 bg-white border border-rose-100 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 shadow-sm"
                  />
                </div>

                {/* Kategoriyalar filtri */}
                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-none">
                  <button 
                    onClick={() => setSelectedCategory('all')}
                    className={`px-4 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap ${selectedCategory === 'all' ? 'bg-rose-500 text-white shadow-md' : 'bg-white text-rose-500 border border-rose-100'}`}
                  >
                    👶 Hammasi
                  </button>
                  {categories.map(cat => (
                    <button 
                      key={cat.id}
                      onClick={() => setSelectedCategory(cat.id)}
                      className={`px-4 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap ${selectedCategory === cat.id ? 'bg-rose-500 text-white shadow-md' : 'bg-white text-rose-500 border border-rose-100'}`}
                    >
                      🏷️ {cat.name}
                    </button>
                  ))}
                </div>

                {/* Mahsulotlar ro'yxati */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {filteredProducts.map(prod => (
                    <div key={prod.id} className="bg-white rounded-3xl overflow-hidden border border-rose-50/50 shadow-sm hover:shadow-md transition flex flex-col justify-between">
                      <div className="relative">
                        <img src={prod.image_url} className="h-44 w-full object-cover" />
                        {prod.stock === 0 && (
                          <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                            <span className="bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded">TUGADI</span>
                          </div>
                        )}
                      </div>
                      <div className="p-3 flex-1 flex flex-col justify-between">
                        <div>
                          <h4 className="font-bold text-gray-800 text-sm line-clamp-1">{prod.name}</h4>
                          <div className="flex gap-1 mt-1 flex-wrap">
                            {prod.size && <span className="bg-rose-50 text-rose-500 text-[10px] px-1.5 py-0.5 rounded font-bold">{prod.size}</span>}
                            {prod.color && <span className="bg-amber-50 text-amber-600 text-[10px] px-1.5 py-0.5 rounded font-bold">{prod.color}</span>}
                          </div>
                        </div>
                        
                        <div className="mt-3 flex items-center justify-between gap-1">
                          <span className="text-rose-600 font-extrabold text-sm">{prod.price?.toLocaleString()} so'm</span>
                          <button 
                            disabled={prod.stock === 0}
                            onClick={() => addToCart(prod)}
                            className={`p-2 rounded-xl transition ${prod.stock === 0 ? 'bg-gray-100 text-gray-400' : 'bg-rose-500 hover:bg-rose-600 text-white'}`}
                          >
                            ➕
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

              </div>
            ) : (
              // =======================================================
              // ADMINPANEL EKRANI
              // =======================================================
              <div className="bg-white rounded-3xl p-6 shadow-sm border border-rose-100">
                
                {/* Admin Tab Navigatsiya */}
                <div className="flex gap-2 border-b border-rose-50 pb-4 mb-6 overflow-x-auto">
                  <button 
                    onClick={() => setAdminTab('products')} 
                    className={`px-4 py-2 rounded-2xl text-xs font-bold whitespace-nowrap ${adminTab === 'products' ? 'bg-rose-500 text-white' : 'bg-rose-50 text-rose-500'}`}
                  >
                    📦 Mahsulotlar
                  </button>
                  <button 
                    onClick={() => setAdminTab('warehouse')} 
                    className={`px-4 py-2 rounded-2xl text-xs font-bold whitespace-nowrap ${adminTab === 'warehouse' ? 'bg-rose-500 text-white' : 'bg-rose-50 text-rose-500'}`}
                  >
                    🏪 Omborxona
                  </button>
                  <button 
                    onClick={() => setAdminTab('sales')} 
                    className={`px-4 py-2 rounded-2xl text-xs font-bold whitespace-nowrap ${adminTab === 'sales' ? 'bg-rose-500 text-white' : 'bg-rose-50 text-rose-500'}`}
                  >
                    🛒 Sotuvlar ({sales.length})
                  </button>
                  <button 
                    onClick={() => setAdminTab('stats')} 
                    className={`px-4 py-2 rounded-2xl text-xs font-bold whitespace-nowrap ${adminTab === 'stats' ? 'bg-rose-500 text-white' : 'bg-rose-50 text-rose-500'}`}
                  >
                    📈 Statistika
                  </button>
                </div>

                {/* 1. MAHSULOTLAR VA KATALOG ADMIN */}
                {adminTab === 'products' && (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center flex-wrap gap-2">
                      <h3 className="text-lg font-bold text-gray-800">Do'kondagi mahsulotlar ro'yxati</h3>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setShowCatModal(true)}
                          className="bg-rose-50 text-rose-600 font-bold text-xs px-3 py-2 rounded-xl"
                        >
                          + Katalog qo'shish
                        </button>
                        <button 
                          onClick={() => setShowProdModal(true)}
                          className="bg-rose-500 text-white font-bold text-xs px-3 py-2 rounded-xl"
                        >
                          + Tovar qo'shish
                        </button>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      {products.map(p => (
                        <div key={p.id} className="p-3 border rounded-2xl flex gap-3 items-center justify-between">
                          <img src={p.image_url} className="w-12 h-12 object-cover rounded-xl" />
                          <div className="flex-1">
                            <h4 className="font-bold text-sm text-gray-800">{p.name}</h4>
                            <p className="text-xs text-rose-500 font-bold">{p.price?.toLocaleString()} so'm</p>
                          </div>
                          <button 
                            onClick={async () => {
                              if (confirm("Ushbu mahsulotni butunlay o'chirmoqchimisiz?")) {
                                await supabaseClient.from('products').delete().eq('id', p.id);
                                loadData();
                              }
                            }}
                            className="text-red-500 hover:bg-red-50 p-2 rounded-lg"
                          >
                            🗑️
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 2. OMBORXONA INTEGRATSIYASI */}
                {adminTab === 'warehouse' && (
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-gray-800">Qoldiq mahsulotlar</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-sm">
                        <thead>
                          <tr className="bg-rose-50/50 text-rose-600 font-bold border-b">
                            <th className="p-3">Maxsulot nomi</th>
                            <th className="p-3">Razmer</th>
                            <th className="p-3">Sotish narxi</th>
                            <th className="p-3">Tannarxi</th>
                            <th className="p-3">Zaxira (Soni)</th>
                            <th className="p-3">Amal</th>
                          </tr>
                        </thead>
                        <tbody>
                          {products.map(p => (
                            <tr key={p.id} className="border-b hover:bg-gray-50">
                              <td className="p-3 font-semibold">{p.name}</td>
                              <td className="p-3">{p.size || '-'}</td>
                              <td className="p-3 font-bold">{p.price?.toLocaleString()} so'm</td>
                              <td className="p-3 text-gray-500">{p.cost?.toLocaleString()} so'm</td>
                              <td className="p-3">
                                <span className={`px-2 py-1 rounded font-bold text-xs ${p.stock <= p.min_stock ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-600'}`}>
                                  {p.stock} dona
                                </span>
                              </td>
                              <td className="p-3 flex gap-2">
                                <button 
                                  onClick={async () => {
                                    const count = prompt("Qancha qo'shmoqchisiz?", "10");
                                    if (count) {
                                      await supabaseClient.from('products').update({ stock: p.stock + parseInt(count) }).eq('id', p.id);
                                      loadData();
                                    }
                                  }}
                                  className="bg-rose-50 text-rose-600 text-[10px] font-bold px-2 py-1 rounded"
                                >
                                  + Zaxira qo'shish
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* 3. SOTUVLAR INTEGRATSIYASI */}
                {adminTab === 'sales' && (
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-gray-800">Mijozlardan kelgan buyurtmalar</h3>
                    <div className="space-y-4">
                      {sales.map(s => (
                        <div key={s.id} className="border border-rose-50 rounded-2xl p-4 space-y-3">
                          <div className="flex justify-between items-center flex-wrap gap-2 border-b pb-2">
                            <div>
                              <h4 className="font-bold text-gray-800">{s.customer_name}</h4>
                              <p className="text-xs text-gray-400">{new Date(s.created_at).toLocaleString()}</p>
                            </div>
                            <span className="bg-rose-500 text-white font-bold text-xs px-2 py-1 rounded-lg">
                              Status: {s.status}
                            </span>
                          </div>

                          <div className="text-xs space-y-1">
                            <p>📞 *Tel:* {s.customer_phone}</p>
                            <p>📍 *Manzil:* {s.customer_address}</p>
                            <p>💳 *To'lov usuli:* {s.payment_method}</p>
                          </div>

                          <div className="bg-rose-50/50 p-2 rounded-xl text-xs space-y-1">
                            {s.sale_items?.map(i => (
                              <div key={i.id} className="flex justify-between">
                                <span>🧸 {i.product_name} x {i.quantity}</span>
                                <span className="font-bold">{i.subtotal?.toLocaleString()} so'm</span>
                              </div>
                            ))}
                          </div>

                          <div className="flex justify-between items-center pt-2">
                            <span className="font-extrabold text-sm text-rose-600">Jami: {s.total?.toLocaleString()} so'm</span>
                            <div className="flex gap-1">
                              <button 
                                onClick={async () => {
                                  await supabaseClient.from('sales').update({ status: 'yetkazildi' }).eq('id', s.id);
                                  loadData();
                                }}
                                className="bg-green-500 text-white font-bold text-[10px] px-2.5 py-1 rounded-lg"
                              >
                                Yetkazildi
                              </button>
                              <button 
                                onClick={async () => {
                                  if (confirm("Buyurtmani bekor qilmoqchimisiz?")) {
                                    await supabaseClient.from('sales').update({ status: 'bekor qilindi' }).eq('id', s.id);
                                    loadData();
                                  }
                                }}
                                className="bg-red-500 text-white font-bold text-[10px] px-2.5 py-1 rounded-lg"
                              >
                                Bekor qilish
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 4. STATISTIKA INTERFEYSI */}
                {adminTab === 'stats' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="bg-rose-50/50 p-4 rounded-2xl border border-rose-100">
                      <p className="text-xs text-rose-400 font-bold">UMUMIY TUSHUM</p>
                      <h4 className="text-2xl font-black text-rose-600 mt-1">
                        {sales.filter(s => s.status !== 'bekor qilindi').reduce((sum, s) => sum + s.total, 0).toLocaleString()} so'm
                      </h4>
                    </div>

                    <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                      <p className="text-xs text-blue-400 font-bold">YANGI BUYURTMALAR</p>
                      <h4 className="text-2xl font-black text-blue-600 mt-1">
                        {sales.filter(s => s.status === 'yangi').length} ta
                      </h4>
                    </div>
                  </div>
                )}

              </div>
            )}
          </main>

          {/* ================= SAVATCHA DRAWER MODAL ================= */}
          {cartOpen && (
            <div className="fixed inset-0 bg-black/50 z-50 flex justify-end">
              <div className="bg-white w-full max-w-md h-full p-6 flex flex-col justify-between shadow-2xl">
                <div>
                  <div className="flex justify-between items-center border-b pb-3 mb-4">
                    <h3 className="text-xl font-bold text-gray-800">Sizning savatchangiz</h3>
                    <button onClick={() => setCartOpen(false)} className="text-2xl">&times;</button>
                  </div>

                  {cart.length === 0 ? (
                    <div className="text-center py-10 text-gray-400">Savatchangiz bo'sh 🧸</div>
                  ) : (
                    <div className="space-y-3 max-h-[60vh] overflow-y-auto">
                      {cart.map(item => (
                        <div key={item.id} className="flex gap-3 items-center border-b pb-2">
                          <img src={item.image_url} className="w-12 h-12 object-cover rounded-xl" />
                          <div className="flex-1">
                            <h4 className="font-bold text-sm text-gray-800">{item.name}</h4>
                            <p className="text-xs text-rose-600 font-bold">{item.price?.toLocaleString()} so'm</p>
                          </div>
                          <div className="flex items-center gap-2">
                            <button onClick={() => updateCartQty(item.id, -1)} className="bg-rose-50 px-2 py-1 rounded text-rose-600 font-bold">-</button>
                            <span className="font-bold text-sm">{item.quantity}</span>
                            <button onClick={() => updateCartQty(item.id, 1)} className="bg-rose-50 px-2 py-1 rounded text-rose-600 font-bold">+</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {cart.length > 0 && (
                  <div className="border-t pt-4">
                    <div className="flex justify-between font-bold text-lg mb-4 text-rose-600">
                      <span>Jami summa:</span>
                      <span>{cart.reduce((sum, x) => sum + (x.price * x.quantity), 0).toLocaleString()} so'm</span>
                    </div>
                    <button 
                      onClick={() => setCheckoutOpen(true)}
                      className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-2xl transition text-center block shadow-lg"
                    >
                      Rasmiylashtirish
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ================= BUYURTMA OLISH MODALI ================= */}
          {checkoutOpen && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <form onSubmit={handleCheckout} className="bg-white p-6 rounded-3xl w-full max-w-md shadow-2xl space-y-4">
                <h3 className="text-lg font-bold text-rose-600">Buyurtmani yakunlash</h3>
                
                <div>
                  <label className="text-xs font-bold text-gray-400 block mb-1">Ismingiz</label>
                  <input required type="text" value={custName} onChange={(e) => setCustName(e.target.value)} className="w-full border rounded-xl p-2" />
                </div>

                <div>
                  <label className="text-xs font-bold text-gray-400 block mb-1">Telefon raqamingiz</label>
                  <input required type="text" value={custPhone} onChange={(e) => setCustPhone(e.target.value)} placeholder="+998 90 123 45 67" className="w-full border rounded-xl p-2" />
                </div>

                <div>
                  <label className="text-xs font-bold text-gray-400 block mb-1">Yetkazib berish manzili</label>
                  <input required type="text" value={custAddress} onChange={(e) => setCustAddress(e.target.value)} placeholder="Toshkent shahar, Chilonzor 1-mavze" className="w-full border rounded-xl p-2" />
                </div>

                <div>
                  <label className="text-xs font-bold text-gray-400 block mb-1">To'lov turi</label>
                  <select value={paymentMethod} onChange={(e) => setPaymentMethod(e.target.value)} className="w-full border rounded-xl p-2">
                    <option value="naqd">Naqd to'lov</option>
                    <option value="karta">Karta orqali (Payme/Click)</option>
                  </select>
                </div>

                <div className="flex justify-end gap-2 pt-2">
                  <button type="button" onClick={() => setCheckoutOpen(false)} className="bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold">Bekor qilish</button>
                  <button type="submit" className="bg-rose-500 text-white px-4 py-2 rounded-xl text-xs font-bold">Yuborish</button>
                </div>
              </form>
            </div>
          )}

          {/* ================= MODAL: KATALOG QO'SHISH ================= */}
          {showCatModal && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <form onSubmit={handleCreateCategory} className="bg-white p-6 rounded-3xl w-full max-w-sm space-y-4">
                <h3 className="font-bold text-gray-800">Yangi Katalog (Kategoriya) qo'shish</h3>
                <input required type="text" value={catNameInput} onChange={(e) => setCatNameInput(e.target.value)} placeholder="Masalan: Yozgi kiyimlar" className="w-full border rounded-xl p-2" />
                <div className="flex justify-end gap-2">
                  <button type="button" onClick={() => setShowCatModal(false)} className="bg-gray-100 px-3 py-2 rounded-xl text-xs font-bold">Bekor qilish</button>
                  <button type="submit" className="bg-rose-500 text-white px-3 py-2 rounded-xl text-xs font-bold">Saqlash</button>
                </div>
              </form>
            </div>
          )}

          {/* ================= MODAL: MAHSULOT QO'SHISH ================= */}
          {showProdModal && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 overflow-y-auto">
              <form onSubmit={handleCreateProduct} className="bg-white p-6 rounded-3xl w-full max-w-md space-y-3">
                <h3 className="font-bold text-gray-800">Yangi tovar qo'shish</h3>
                
                <input required type="text" placeholder="Tovar nomi" value={prodName} onChange={(e) => setProdName(e.target.value)} className="w-full border rounded-xl p-2 text-sm" />
                
                <div className="grid grid-cols-2 gap-2">
                  <input required type="number" placeholder="Sotish narxi" value={prodPrice} onChange={(e) => setProdPrice(e.target.value)} className="w-full border rounded-xl p-2 text-sm" />
                  <input type="number" placeholder="Tannarxi (cost)" value={prodCost} onChange={(e) => setProdCost(e.target.value)} className="w-full border rounded-xl p-2 text-sm" />
                </div>

                <select required value={prodCat} onChange={(e) => setProdCat(e.target.value)} className="w-full border rounded-xl p-2 text-sm">
                  <option value="">Katalogni tanlang</option>
                  {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>

                <div className="grid grid-cols-3 gap-2">
                  <input type="text" placeholder="Razmer" value={prodSize} onChange={(e) => setProdSize(e.target.value)} className="w-full border rounded-xl p-2 text-sm" />
                  <input type="text" placeholder="Rang" value={prodColor} onChange={(e) => setProdColor(e.target.value)} className="w-full border rounded-xl p-2 text-sm" />
                  <input type="number" placeholder="Zaxira soni" value={prodStock} onChange={(e) => setProdStock(e.target.value)} className="w-full border rounded-xl p-2 text-sm" />
                </div>

                <input type="text" placeholder="Rasm URL (internetdan link)" value={prodImage} onChange={(e) => setProdImage(e.target.value)} className="w-full border rounded-xl p-2 text-sm" />

                <div className="flex justify-end gap-2 pt-2">
                  <button type="button" onClick={() => setShowProdModal(false)} className="bg-gray-100 px-3 py-2 rounded-xl text-xs font-bold">Bekor qilish</button>
                  <button type="submit" className="bg-rose-500 text-white px-3 py-2 rounded-xl text-xs font-bold">Saqlash</button>
                </div>
              </form>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
